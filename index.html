<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Larissa Oliveira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #f0ebe0;
      --ink: #16120c;
      --accent: oklch(52% 0.16 240);
      --accent2: oklch(52% 0.14 200);
      --muted: oklch(48% 0.04 55);
      --surface: #e6e0d6;
      --surface2: #ddd7cc;
      --border: rgba(22,18,12,0.1);
      --font-d: 'Clash Display', sans-serif;
      --font-s: 'Instrument Serif', serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-d);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ── NAV ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 20px 48px;
      display: flex; align-items: center; justify-content: space-between;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease, background 0.5s ease;
    }
    .nav.visible {
      opacity: 1; pointer-events: all;
      background: rgba(240,235,224,0.85);
      backdrop-filter: blur(12px);
    }
    .nav-name { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
    .nav-menu-btn {
      display: none;
      align-items: center; justify-content: center;
      width: 44px; height: 44px; padding: 0;
      background: none; border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; color: var(--ink);
      flex-shrink: 0;
    }
    .nav-menu-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .nav-menu-icon { display: flex; flex-direction: column; gap: 5px; width: 18px; }
    .nav-menu-icon span { display: block; height: 2px; background: var(--ink); border-radius: 1px; }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); transition: color 0.2s; }
    .nav-links a:hover { color: var(--ink); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(260px, 0.85fr) minmax(0, 1.2fr);
      gap: clamp(40px, 6vw, 80px);
      align-items: center;
      padding: 100px clamp(32px, 5vw, 64px) 100px;
      position: relative; overflow: hidden;
      background: var(--bg);
    }
    .hero-welcome {
      font-family: var(--font-s);
      font-style: italic; font-weight: 400;
      font-size: clamp(2.2rem, 4.4vw, 4rem);
      line-height: 1.05; letter-spacing: -0.005em;
      color: var(--ink);
      opacity: 0; transform: translateY(20px);
      animation: heroWelcomeIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }
    .hero-tiles {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      column-gap: 9px;
      row-gap: clamp(10px, 0.9vw, 16px);
      width: 100%;
      max-width: 880px;
      justify-self: end;
    }
    .hero-tile {
      aspect-ratio: 817 / 947;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      animation: tilePop 0.7s ease forwards;
      position: relative;
      user-select: none;
    }
    .hero-tile-img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }
    @media (max-width: 968px) {
      .hero { grid-template-columns: 1fr; gap: 48px; padding-top: 120px; padding-bottom: 120px; }
      .hero-tiles { justify-self: stretch; max-width: 100%; }
      .hero-welcome { text-align: center; }
      .hero-scroll { align-items: center; }
    }
    @media (max-width: 520px) {
      .hero-tiles { grid-template-columns: repeat(3, 1fr); }
    }
    .hero-scroll {
      display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
      margin-top: 36px;
      opacity: 0; animation: fadeIn 1s ease forwards; animation-delay: 1.5s;
    }
    .hero-scroll span { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .scroll-line {
      width: 1px; height: 48px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    .hero-end-spacer {
      min-height: clamp(100px, 24vh, 300px);
      background: var(--bg);
    }

    /* ── MANIFESTO ── */
    .manifesto {
      padding: 120px 48px;
      max-width: 1100px; margin: 0 auto;
      border-top: 1px solid var(--border);
    }
    .manifesto-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 40px; }
    .manifesto-text {
      font-family: var(--font-s);
      font-size: clamp(calc(1.4rem), calc(2.7vw), calc(4.4rem));
      line-height: 1.15; letter-spacing: -0.01em;
      color: var(--ink);
    }
    .manifesto-text em { font-style: normal; color: var(--accent); }
    .manifesto-text br + br { display: none; }
    .manifesto-text .quiet { color: var(--muted); }
    .disciplines {
      display: flex; flex-wrap: wrap; gap: 12px;
      margin-top: 56px;
    }
    .discipline-tag {
      border: 1.5px solid var(--border); border-radius: 100px;
      padding: 8px 20px;
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500;
      color: var(--muted);
      transition: border-color 0.3s, color 0.3s, background 0.3s;
    }
    .discipline-tag:hover { border-color: var(--accent); color: var(--accent); background: oklch(96% 0.04 28); }

    /* ── TICKER ── */
    .ticker { overflow: hidden; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 16px 0; }
    .ticker-track { display: flex; width: max-content; animation: ticker 28s linear infinite; }
    .ticker-item { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); white-space: nowrap; padding: 0 40px; }
    .ticker-dot { color: var(--accent); }

    /* ── SECTION HEADER ── */
    .section-header { padding: 80px 48px 40px; max-width: 1200px; margin: 0 auto; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }
    .section-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .section-count { font-size: 0.7rem; letter-spacing: 0.1em; color: var(--muted); }

    /* ── PROJECTS GRID ── */
    .projects-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 0 48px 80px; max-width: 1200px; margin: 0 auto; }
    .projects-grid--upper { padding-bottom: 0; }
    .projects-divider {
      max-width: 1200px;
      margin: 56px auto 28px;
      padding: 0 48px;
      display: flex; align-items: center; gap: 18px;
    }
    .projects-divider::before, .projects-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .projects-divider-label {
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted);
    }
    @media (max-width: 768px) {
      .projects-divider { padding: 0 24px; margin: 40px auto 20px; }
    }
    .project-card {
      background: var(--surface); cursor: pointer; overflow: hidden;
      border-radius: 4px;
      transition: transform 0.35s cubic-bezier(0.34,1,0.64,1), box-shadow 0.35s ease;
    }
    .project-card:hover { transform: translateY(-6px); box-shadow: 0 24px 48px rgba(22,18,12,0.12); }
    .project-card-img {
      width: 100%; aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .project-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .project-card:hover .project-card-img img { transform: scale(1.04); }
    .project-card-logo { width: 100%; height: 100%; object-fit: contain; }
    .project-card-body { padding: 20px 24px 24px; display: flex; justify-content: space-between; align-items: flex-end; }
    .project-card-title { font-size: 1rem; font-weight: 600; letter-spacing: 0.04em; }
    .project-card-tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .pill {
      font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500;
      padding: 4px 10px; border-radius: 100px;
      background: var(--surface2); color: var(--muted);
    }
    .pill-accent { background: oklch(94% 0.04 240); color: oklch(40% 0.12 240); }
    .card-reveal {
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    .card-reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── CREATIVE GRID ── */
    .creative-grid { columns: 3; gap: 4px; padding: 0 48px 80px; max-width: 1200px; margin: 0 auto; }
    .creative-item { break-inside: avoid; margin-bottom: 6px; position: relative; overflow: hidden; cursor: pointer; border-radius: 4px; }
    .creative-item img, .creative-item video { width: 100%; display: block; transition: transform 0.5s ease; }
    .creative-item:hover img, .creative-item:hover video { transform: none; }
    .creative-item--small-left img { width: 58%; margin-left: 0; margin-right: auto; }
    .creative-item-pair { display: flex; gap: 4px; align-items: flex-start; }
    .creative-item--pair-small .creative-item-pair { width: 96%; }
    .creative-item-half { position: relative; width: calc(50% - 2px); cursor: pointer; overflow: hidden; border-radius: 4px; }
    .creative-item-half img { width: 100%; display: block; }
    .creative-item-half-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(22,18,12,0.72) 0%, transparent 55%);
      opacity: 0; transition: opacity 0.25s ease;
      display: flex; flex-direction: column; justify-content: flex-end; padding: 12px;
    }
    .creative-item-half:hover .creative-item-half-overlay { opacity: 1; }
    .creative-item-half-title { color: #f0ebe0; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.2; }
    .creative-item-half-desc { color: rgba(240,235,224,0.75); font-size: 0.56rem; margin-top: 3px; line-height: 1.2; }
    .creative-item-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(22,18,12,0.7) 0%, transparent 50%);
      opacity: 0; transition: opacity 0.3s ease;
      display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
    }
    .creative-item:hover .creative-item-overlay { opacity: 1; }
    .creative-item-title { color: #f0ebe0; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .creative-item-desc { color: rgba(240,235,224,0.7); font-size: 0.65rem; margin-top: 4px; }

    /* ── ABOUT SECTION ── */
    .about-section { padding: 80px 48px; max-width: 1200px; margin: 0 auto; border-top: 1px solid var(--border); scroll-margin-top: 88px; }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; margin-top: 48px; }
    .about-bio { font-family: var(--font-s); font-size: clamp(1.1rem, 2vw, 1.7rem); line-height: 1.5; color: var(--ink); font-weight: 400; }
    .about-bio em { font-style: italic; color: var(--accent); }
    .about-bio p + p { margin-top: 1em; }
    .about-detail-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
    .chip-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .chip {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 16px; background: var(--surface); border-radius: 8px;
    }
    .chip-logo { width: 40px; height: 40px; object-fit: contain; border-radius: 50%; }
    .chip-title { font-size: 0.82rem; font-weight: 600; }
    .chip-sub { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

    /* ── SPORTS ── */
    .sports-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin: 20px 0; border-radius: 8px; overflow: hidden; }
    .sports-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .sports-bullets { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; }
    .sports-bullets li { font-size: 0.78rem; color: var(--muted); list-style: none; padding-left: 14px; position: relative; line-height: 1.5; }
    .sports-bullets li::before { content: '—'; position: absolute; left: 0; color: var(--accent); }

    /* ── BOOKS ── */
    .books-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 16px 0; scrollbar-width: none; }
    .books-scroll::-webkit-scrollbar { display: none; }
    .books-scroll img { height: 200px; width: auto; border-radius: 4px; flex-shrink: 0; transition: transform 0.3s; }
    .books-scroll img:hover { transform: scale(1.08) translateY(-4px); }

    /* ── CONTACT ── */
    .contact-page {
      min-height: 70vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 140px 32px 80px;
      max-width: 640px; margin: 0 auto;
      text-align: center;
    }
    .contact-heading {
      font-family: var(--font-s);
      font-style: italic; font-weight: 400;
      font-size: clamp(2.4rem, 5vw, 4rem);
      letter-spacing: -0.005em;
      color: var(--ink);
      margin-bottom: 56px;
    }
    .contact-list {
      list-style: none;
      display: flex; flex-direction: column;
      gap: 28px;
      width: 100%; max-width: 460px;
    }
    .contact-row {
      display: flex; flex-direction: column;
      gap: 8px;
      text-align: left;
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }
    .contact-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .contact-value {
      font-size: 1.05rem;
      color: var(--ink);
      transition: color 0.2s;
      word-break: break-word;
    }
    .contact-value:hover { color: var(--accent); }

    /* ── FOOTER ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 48px;
      display: flex; justify-content: space-between; align-items: flex-end;
    }
    .footer-name { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
    .footer-links { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .footer-links a { font-size: 0.75rem; color: var(--muted); transition: color 0.2s; }
    .footer-links a:hover { color: var(--ink); }
    .footer-copy { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; margin-top: 12px; }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      transform: translateY(100%);
      transition: transform 0.55s cubic-bezier(0.16,1,0.3,1);
      display: flex; flex-direction: column;
    }
    .overlay.open { transform: translateY(0); }
    .overlay-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px; border-bottom: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
      position: sticky; top: 0; z-index: 10;
    }
    .overlay-back {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500;
      background: none; border: none; cursor: pointer; color: var(--ink);
      transition: color 0.2s;
    }
    .overlay-back:hover { color: var(--accent); }
    .overlay-back svg { transition: transform 0.2s; }
    .overlay-back:hover svg { transform: translateX(-3px); }
    .overlay-scroll { flex: 1; overflow-y: auto; }
    .overlay-hero { padding: 64px 48px 48px; border-bottom: 1px solid var(--border); }
    .overlay-title { font-size: clamp(2rem, 6vw, 5rem); font-weight: 700; letter-spacing: -0.02em; }
    .overlay-meta { display: flex; gap: 40px; margin-top: 24px; }
    .overlay-meta-item label { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 4px; }
    .overlay-meta-item span { font-size: 0.82rem; font-weight: 500; }
    .proj-section { padding: 64px 48px; border-bottom: 1px solid var(--border); max-width: 900px; }
    .proj-section:nth-child(even) { background: var(--surface); max-width: none; padding: 64px calc(50% - 450px + 48px); }
    .proj-heading { font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }
    .proj-body { font-family: var(--font-s); font-size: clamp(1rem, 1.8vw, 1.4rem); line-height: 1.6; color: var(--ink); }
    .proj-gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 28px; }
    .proj-gallery img { width: 100%; border-radius: 4px; object-fit: cover; aspect-ratio: 4/3; }
    .proj-gallery--single img { grid-column: 1 / -1; }
    .proj-feature-img { width: 100%; border-radius: 8px; margin-top: 28px; overflow: hidden; }
    .proj-feature-img img { width: 100%; }
    .site-preview {
      position: relative;
      margin-top: 28px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 0 12px 40px rgba(22,18,12,0.13);
    }
    .site-preview-frame {
      width: 100%;
      height: clamp(440px, 70vh, 720px);
      border: none;
      display: block;
      background: var(--surface);
    }
    .site-preview-link {
      position: absolute;
      top: 14px; right: 14px;
      background: var(--ink); color: var(--bg);
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 9px 18px; border-radius: 100px;
      text-decoration: none;
      z-index: 2;
      box-shadow: 0 4px 14px rgba(22,18,12,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .site-preview-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(22,18,12,0.35);
    }
    .proj-side { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
    .proj-side img { width: 100%; border-radius: 8px; }
    .news-snippet { margin-top: 20px; padding: 16px; background: var(--surface); border-radius: 8px; border-left: 3px solid var(--accent); }
    .news-source { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
    .news-headline { font-size: 0.85rem; font-weight: 600; margin: 6px 0; line-height: 1.4; }
    .news-link { font-size: 0.72rem; color: var(--accent); text-decoration: underline; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(22,18,12,0.92);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 48px;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox img, .lightbox video { max-width: 90vw; max-height: 85vh; border-radius: 4px; object-fit: contain; }
    .lightbox-close {
      position: absolute; top: 24px; right: 32px;
      background: none; border: none; cursor: pointer;
      font-size: 1.5rem; color: #f0ebe0; opacity: 0.7;
      transition: opacity 0.2s;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-caption { position: absolute; bottom: 32px; left: 0; right: 0; text-align: center; color: rgba(240,235,224,0.7); font-size: 0.75rem; letter-spacing: 0.08em; }

    /* ── MY WORK ── */
    .my-work { padding: 100px clamp(24px, 4vw, 48px); max-width: 1400px; margin: 0 auto; }
    .my-work-title {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      text-align: center;
      margin-bottom: 28px;
    }
    .my-work-buttons {
      display: flex;
      gap: clamp(8px, 1vw, 16px);
      width: 100%;
    }
    .my-work-btn {
      border: none;
      border-radius: clamp(16px, 1.8vw, 24px);
      height: clamp(160px, 22vw, 260px);
      font-family: var(--font-s); font-style: italic; font-weight: 400;
      font-size: clamp(1.6rem, 3.4vw, 3rem);
      color: var(--ink);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: filter 0.25s ease;

    function useReveal(threshold = 0.15, options = {}) {
      const { rootMargin } = options;

      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const obsConfig = { threshold };
        if (rootMargin != null) obsConfig.rootMargin = rootMargin;
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) setVisible(true); },
          obsConfig
        );
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, [threshold, rootMargin]);
      return [ref, visible];
    }

    // ─── About ──────────────────────────────────────────────────────────────────
    function AboutSection() {
      const [ref, visible] = useReveal(0.1);
      return (
        <section id="about-section" className="about-section" ref={ref} style={{ opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(32px)', transition: 'opacity 0.9s ease, transform 0.9s ease' }}>
          <div className="about-grid" style={{ marginTop: 0 }}>
            <div style={{ marginTop: 0 }}>
              <div className="about-detail-label" style={{ marginBottom: 20 }}>Education</div>
              <div className="about-bio">
                <p>The <span style={{ color: 'var(--accent)' }}>Iovine and Young Academy</span> is a first-of-its-kind program built on the belief that the biggest problems in the world require people who refuse to work in silos.</p>
                <p>Founded by Jimmy Iovine & Dr. Dre, the Academy trains a small, highly selective cohort to operate at the intersection of technology, design, business, and the arts — simultaneously, not sequentially.</p>
                <a href="https://www.youtube.com/watch?v=1C3O4SC7AA8" target="_blank" rel="noopener" style={{ display: 'inline-flex', alignItems: 'center', gap: '5px', marginTop: '20px', fontSize: '0.65rem', letterSpacing: '0.2em', textTransform: 'uppercase', fontWeight: 500, color: 'var(--accent)', fontFamily: 'var(--font-d)', transition: 'color 0.2s' }}
                  onMouseEnter={e => e.currentTarget.style.color = 'var(--accent)'}
                  onMouseLeave={e => e.currentTarget.style.color = 'var(--accent)'}
                >
                  Watch to learn more
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.5 9.5L9.5 2.5M9.5 2.5H4.5M9.5 2.5V7.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </a>
              </div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 40 }}>
              <div>
                <div className="about-detail-label">Experience <a href="https://drive.google.com/file/d/1o45AmgtqrJzkI6SirF3MK5DLP4-x20mA/view?usp=sharing" target="_blank" rel="noopener" style={{ color: 'var(--accent)', marginLeft: 8 }}>↗ resume</a></div>
                <ul className="chip-list">
                  {EXPERIENCE.map(e => (
                    <li key={e.name}>
                      <div className="chip">
                        <img src={e.logo} className="chip-logo" alt={e.name} />
                        <div><div className="chip-title">{e.name}</div><div className="chip-sub">{e.role} · {e.period}</div></div>
                      </div>
                    </li>
                  ))}
                </ul>
              </div>
              <div>
                <div className="about-detail-label">Leadership & Involvement</div>
                <ul className="chip-list">
                  {LEADERSHIP.map(l => (
                    <li key={l.name}>
                      <div className="chip">
                        <img src={l.logo} className="chip-logo" alt={l.name} />
                        <div><div className="chip-title">{l.name}</div><div className="chip-sub">{l.role} · {l.period}</div></div>
                      </div>
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          </div>

          <div style={{ marginTop: 64 }}>
            <div className="about-detail-label">Sports background</div>
            <div className="sports-grid">
              <img src="imgs/swim.png" alt="Swimming" />
              <img src="imgs/medal.png" alt="Medal" />
              <img src="imgs/run.png" alt="Running" />
              <img src="imgs/half.png" alt="Half marathon" />
            </div>
            <ul className="sports-bullets" style={{ marginTop: 16 }}>
              {['Competitive swimmer for 10+ years', 'Started running after retiring from swimming','Represented the largest sport club in LATAM','Ran 3 half marathons in the past year','Multi national and state medalist','Currently training for a sub 2-hour half'].map(b => <li key={b}>{b}</li>)}
            </ul>
          </div>

          <div style={{ marginTop: 64 }}>
            <div className="about-detail-label">My Book Shelf</div>
            <div className="books-scroll">
              {BOOKS.map((b, i) => <img key={i} src={b} alt="" />)}
            </div>
          </div>
        </section>
      );
    }

    // ─── Footer ─────────────────────────────────────────────────────────────────
    function Footer() {
      return (
        <footer className="footer">
          <div>
            <div className="footer-name">Larissa Oliveira</div>
            <div style={{ fontSize: '0.72rem', color: 'var(--muted)', marginTop: 8 }}>Building at the intersection of technology, design & business</div>
          </div>
          <div className="footer-links">
            <a href="mailto:abujamra@usc.edu">abujamra@usc.edu</a>
            <a href="https://linkedin.com/in/larissa-oliveira2005" target="_blank" rel="noopener">linkedin.com/in/larissa-oliveira2005</a>
            <div className="footer-copy">© 2025 Larissa Oliveira</div>
          </div>
        </footer>
      );
    }

    // ─── Contact Page ───────────────────────────────────────────────────────────
    function ContactPage() {
      return (
        <section className="contact-page">
          <h1 className="contact-heading">let's connect</h1>
          <ul className="contact-list">
            <li className="contact-row">
              <span className="contact-label">Email</span>
              <a className="contact-value" href="mailto:abujamra@usc.edu">abujamra@usc.edu</a>
            </li>
            <li className="contact-row">
              <span className="contact-label">LinkedIn</span>
              <a className="contact-value" href="https://linkedin.com/in/larissa-oliveira2005" target="_blank" rel="noopener">linkedin.com/in/larissa-oliveira2005</a>
            </li>
          </ul>
        </section>
      );
    }

    // ─── Project Overlay ────────────────────────────────────────────────────────
    function ProjectOverlay({ project, onClose }) {
      const scrollRef = useRef(null);
      useEffect(() => {
        if (project && scrollRef.current) scrollRef.current.scrollTop = 0;
        document.body.style.overflow = project ? 'hidden' : '';
        return () => { document.body.style.overflow = ''; };
      }, [project]);

      useEffect(() => {
        const onKey = e => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [onClose]);

      const renderSection = (sec, i) => {
        const isAlt = i % 2 === 1;
        return (
          <div key={i} className={`proj-section${isAlt ? ' proj-section--alt' : ''}`} style={isAlt ? { background: 'var(--surface)', maxWidth: 'none', padding: '64px 48px' } : {}}>
            <div style={{ maxWidth: sec.type === 'side' && sec.imageRight ? 'none' : 800, margin: '0 auto' }}>
              <div className="proj-heading">{sec.heading}</div>
              {!(sec.type === 'side' && sec.imageRight) && <p className="proj-body">{sec.body}</p>}
              {!(sec.type === 'side' && sec.imageRight) && sec.link && (
                <a href={sec.link.url} target="_blank" rel="noopener" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, marginTop: 20, padding: '10px 22px', borderRadius: 100, border: '1.5px solid var(--border)', fontSize: '0.72rem', letterSpacing: '0.1em', textTransform: 'uppercase', fontFamily: 'var(--font-d)', fontWeight: 600, color: 'var(--accent)', textDecoration: 'none', transition: 'border-color 0.2s' }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--accent)'}
                  onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
                >{sec.link.label}</a>
              )}
              {sec.type === 'text-images' && sec.images && (
                <div className={`proj-gallery ${sec.images.length === 1 ? 'proj-gallery--single' : ''}`}>
                  {sec.images.map((img, j) => <img key={j} src={img} alt="" style={{ objectPosition: sec.imgPositions?.[j] || 'center' }} />)}
                </div>
              )}
              {sec.type === 'feature' && sec.image && (
                <div className="proj-feature-img"><img src={sec.image} alt="" /></div>
              )}
              {sec.type === 'site-preview' && sec.url && (
                <div className="site-preview">
                  <iframe className="site-preview-frame" src={sec.url} loading="lazy" title={`${sec.heading || 'Site'} preview`} />
                  <a className="site-preview-link" href={sec.url} target="_blank" rel="noopener">Visit site ↗</a>
                </div>
              )}
              {sec.type === 'side' && !sec.imageRight && (
                <div className="proj-side" style={{ marginTop: 28 }}>
                  {sec.image && <img src={sec.image} alt="" style={{ borderRadius: 8 }} />}
                  <div>
                    {sec.news && (
                      <div className="news-snippet">
                        <div className="news-source">{sec.news.source}</div>
                        <div className="news-headline">{sec.news.headline}</div>
                        <a href={sec.news.link} target="_blank" rel="noopener" className="news-link">Read article ↗</a>
                      </div>
                    )}
                  </div>
                </div>
              )}
              {sec.type === 'side' && sec.imageRight && (
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, alignItems: 'center', marginTop: 16 }}>
                  <div>
                    <p className="proj-body">{sec.body}</p>
                    {sec.link && (
                      <a href={sec.link.url} target="_blank" rel="noopener" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, marginTop: 20, padding: '10px 22px', borderRadius: 100, border: '1.5px solid var(--border)', fontSize: '0.72rem', letterSpacing: '0.1em', textTransform: 'uppercase', fontFamily: 'var(--font-d)', fontWeight: 600, color: 'var(--accent)', textDecoration: 'none', transition: 'border-color 0.2s' }}
                        onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--accent)'}
                        onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
                      >{sec.link.label}</a>
                    )}
                  </div>
                  <img src={sec.image} alt="" style={{ borderRadius: 8, width: '100%', aspectRatio: '4/3', objectFit: 'cover', objectPosition: 'center' }} />
                </div>
              )}
            </div>
          </div>
        );
      };

      return (
        <div className={`overlay ${project ? 'open' : ''}`}>
          <div className="overlay-nav">
            <button className="overlay-back" onClick={onClose}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Back
            </button>
            {project?.externalUrl && (
              <a href={project.externalUrl} target="_blank" rel="noopener" style={{ fontSize: '0.75rem', letterSpacing: '0.08em', color: 'var(--accent)' }}>
                Visit site ↗
              </a>
            )}
          </div>
          <div className="overlay-scroll" ref={scrollRef}>
            {project && (
              <>
                <div className="overlay-hero">
                  <h1 className="overlay-title">{project.title}</h1>
                  <div className="overlay-meta">
                    <div className="overlay-meta-item"><label>Timeline</label><span>{project.timeline}</span></div>
                    <div className="overlay-meta-item"><label>Role</label><span>{project.role}</span></div>
                  </div>
                </div>
                {project.sections.map(renderSection)}
              </>
            )}
            <Footer />
          </div>
        </div>
      );
    }

    // ─── Lightbox ───────────────────────────────────────────────────────────────
    function Lightbox({ item, onClose }) {
      useEffect(() => {
        const onKey = e => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [onClose]);

      return (
        <div className={`lightbox ${item ? 'open' : ''}`} onClick={onClose}>
          <button className="lightbox-close" onClick={onClose}>×</button>
          {item && (
            item.type === 'video'
              ? <video src={item.media} autoPlay loop muted playsInline onClick={e => e.stopPropagation()} />
              : <img src={item.media} alt={item.title} onClick={e => e.stopPropagation()} />
          )}
          {item && <div className="lightbox-caption">{item.title} — {item.desc}</div>}
        </div>
      );
    }

    // ─── Nav ────────────────────────────────────────────────────────────────────
    function Nav({ onSection, onSetPage }) {
      const [visible, setVisible] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      const navRef = useRef(null);

      useEffect(() => {
        const timer = setTimeout(() => setVisible(true), 1200);
        return () => clearTimeout(timer);
      }, []);

      useEffect(() => {
        const onResize = () => { if (window.innerWidth > 768) setMenuOpen(false); };
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      useEffect(() => {
        if (!menuOpen) return;
        const onDown = (e) => {
          if (navRef.current && !navRef.current.contains(e.target)) setMenuOpen(false);
        };
        const onKey = (e) => { if (e.key === 'Escape') setMenuOpen(false); };
        document.addEventListener('mousedown', onDown);
        document.addEventListener('keydown', onKey);
        return () => {
          document.removeEventListener('mousedown', onDown);
          document.removeEventListener('keydown', onKey);
        };
      }, [menuOpen]);

      const closeMenu = () => setMenuOpen(false);

      return (
        <nav
          ref={navRef}
          className={`nav ${visible ? 'visible' : ''}${menuOpen ? ' nav--mobile-menu-open' : ''}`}
        >
          <div className="nav-name">Larissa Oliveira</div>
          <button
            type="button"
            className="nav-menu-btn"
            aria-expanded={menuOpen}
            aria-controls="nav-menu-panel"
            aria-label={menuOpen ? 'Close menu' : 'Open menu'}
            onClick={() => setMenuOpen(o => !o)}
          >
            <span className="nav-menu-icon" aria-hidden="true"><span /><span /><span /></span>
          </button>
          <div id="nav-menu-panel" className="nav-links" role="navigation">
            <a href="#about-section" onClick={closeMenu}>About</a>
            <a href="#" onClick={e => { e.preventDefault(); closeMenu(); onSetPage && onSetPage('projects'); }}>Projects</a>
            <a href="#" onClick={e => { e.preventDefault(); closeMenu(); onSetPage && onSetPage('creative'); }}>Creative</a>
            <a href="#" onClick={e => { e.preventDefault(); closeMenu(); onSetPage && onSetPage('contact'); }}>Contact</a>
          </div>
        </nav>
      );
    }

    // ─── App ────────────────────────────────────────────────────────────────────
    function App() {
      const [activeProject, setActiveProject] = useState(null);
      const [activeCreative, setActiveCreative] = useState(null);
      const [page, setPage] = useState('home');

      useEffect(() => { window.scrollTo(0, 0); }, [page]);

      if (page === 'projects') return (
        <>
          <nav className="nav visible nav--inner">
            <button onClick={() => setPage('home')} className="overlay-back" style={{ background: 'none', border: 'none' }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Back
            </button>
            <div className="nav-links"><a href="#" onClick={e => { e.preventDefault(); setPage('creative'); }}>Creative work</a></div>
          </nav>
          <div style={{ paddingTop: 80 }}><ProjectsSection onOpen={setActiveProject} /></div>
          <Footer />
          <ProjectOverlay project={activeProject} onClose={() => setActiveProject(null)} />
        </>
      );

      if (page === 'creative') return (
        <>
          <nav className="nav visible nav--inner">
            <button onClick={() => setPage('home')} className="overlay-back" style={{ background: 'none', border: 'none' }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Back
            </button>
            <div className="nav-links"><a href="#" onClick={e => { e.preventDefault(); setPage('projects'); }}>Projects</a></div>
          </nav>
          <div style={{ paddingTop: 80 }}><CreativeSection onOpen={setActiveCreative} /></div>
          <Footer />
          <Lightbox item={activeCreative} onClose={() => setActiveCreative(null)} />
        </>
      );

      if (page === 'contact') return (
        <>
          <nav className="nav visible nav--inner">
            <button onClick={() => setPage('home')} className="overlay-back" style={{ background: 'none', border: 'none' }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Back
            </button>
          </nav>
          <ContactPage />
          <Footer />
        </>
      );

      return (
        <>
          <Nav onSetPage={setPage} />
          <AnimatedHero />
          <div id="about">
            <div className="hero-end-spacer" aria-hidden="true" />
            <ManifestoSection />
          </div>
          <MyWork onGoProjects={() => setPage('projects')} onGoCreative={() => setPage('creative')} />
          <AboutSection />
          <Footer />
          <ProjectOverlay project={activeProject} onClose={() => setActiveProject(null)} />
          <Lightbox item={activeCreative} onClose={() => setActiveCreative(null)} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
